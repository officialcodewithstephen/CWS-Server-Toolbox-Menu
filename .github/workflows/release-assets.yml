name: Attach CWS release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate package
        shell: bash
        run: |
          test -s IW4MAdmin/Plugins/CWS.AdminMenu.IW4MAdmin.Plugin.dll
          test -s userraw/z_cws_admin.iwd
          unzip -t userraw/z_cws_admin.iwd

      - name: Attach updater assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            IW4MAdmin/Plugins/CWS.AdminMenu.IW4MAdmin.Plugin.dll \
            userraw/z_cws_admin.iwd \
            --clobber
